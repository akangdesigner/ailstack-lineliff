<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Copying...</title></head>
<body>
    <h2 id="status">🚀 正在讀取內容...</h2>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        async function main() {
            try {
                await liff.init({ liffId: "2009870716-qswS3myM" });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 🌟 關鍵修正：不再只靠 window.location
                // 使用 liff.getContext() 或是直接從 URL 暴力拆解
                const urlObj = new URL(window.location.href);
                let textToCopy = urlObj.searchParams.get('text');

                // 如果上面抓不到，這招是針對 LINE 轉址後的「隱藏參數」
                if (!textToCopy) {
                    const search = window.location.search || (window.location.hash.includes('?') ? window.location.hash.split('?')[1] : '');
                    textToCopy = new URLSearchParams(search).get('text');
                }

                if (textToCopy) {
                    const decodedText = decodeURIComponent(textToCopy);
                    const el = document.createElement('textarea');
                    el.value = decodedText;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);

                    document.getElementById('status').innerText = "✅ 已成功複製！";
                    setTimeout(() => { liff.closeWindow(); }, 1000);
                } else {
                    document.getElementById('status').innerText = "❌ 找不到內容\n目前網址：" + window.location.href;
                }
            } catch (err) {
                document.getElementById('status').innerText = "錯誤: " + err.message;
            }
        }
        main();
    </script>
</body>
</html>
