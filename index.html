<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>正在複製...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <div id="status" style="text-align: center; margin-top: 50px; font-family: sans-serif;">正在自動複製...</div>
    <script>
        async function main() {
            try {
                await liff.init({ liffId: "2009870716-qswS3myM" });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const text = urlParams.get('text');

                if (text) {
                    const decodedText = decodeURIComponent(text);
                    
                    // 使用現代化 Clipboard API
                    await navigator.clipboard.writeText(decodedText);
                    document.getElementById('status').innerText = "✅ 已複製到剪貼簿";
                }
            } catch (err) {
                console.error("LIFF Error:", err);
                // 備用方案：老派 execCommand 寫法 (針對部分舊版內建瀏覽器)
                try {
                    const el = document.createElement('textarea');
                    el.value = decodeURIComponent(new URLSearchParams(window.location.search).get('text'));
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                } catch(e) {}
            } finally {
                // 給用戶一點點時間看到「已複製」，0.5秒後關閉
                setTimeout(() => { liff.closeWindow(); }, 500);
            }
        }
        main();
    </script>
</body>
</html>
